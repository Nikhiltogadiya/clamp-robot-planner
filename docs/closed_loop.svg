<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="'DejaVu Sans', system-ui, sans-serif" role="img" aria-label="The CLAMP closed loop: an instruction is planned, then for every step the arm executes, a camera image is seen, and the step is verified; on failure a recovery agent retries or re-plans; once every step passes a hidden ground-truth check scores real success.">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.2" orient="auto"><path d="M0,0 L8,4.2 L0,8.4 Z" fill="#2dd4bf"/></marker>
    <marker id="ahok" markerWidth="9" markerHeight="9" refX="7" refY="4.2" orient="auto"><path d="M0,0 L8,4.2 L0,8.4 Z" fill="#40b866"/></marker>
    <marker id="ahbad" markerWidth="9" markerHeight="9" refX="7" refY="4.2" orient="auto"><path d="M0,0 L8,4.2 L0,8.4 Z" fill="#e0a413"/></marker>
  </defs>

  <rect x="0" y="0" width="820" height="700" fill="#0a0d11"/>
  <rect x="8" y="6" width="804" height="648" rx="18" fill="#12171d" stroke="#232b34"/>

  <rect x="118" y="16" width="584" height="48" rx="24" fill="#1a222b" stroke="#313b46" stroke-width="1.5"/>
  <text x="410" y="45" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="15" fill="#d3dae1">&#8220;put the red cube in the red bin, then stack green on it&#8221;</text>
  <path d="M410,64 L410,86" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="302" y="86" width="216" height="62" rx="11" fill="#1a222b" stroke="#313b46" stroke-width="1.5"/>
  <text x="410" y="112" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="14" font-weight="700" fill="#e7edf3">PLANNER &#183; LLM</text>
  <text x="410" y="131" text-anchor="middle" font-size="12.5" fill="#9aa6b2">words &#8594; a plan of steps</text>
  <path d="M410,148 L410,170" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="236" y="170" width="348" height="124" rx="11" fill="#1a222b" stroke="#313b46" stroke-width="1.5"/>
  <text x="258" y="193" font-family="'DejaVu Sans Mono', monospace" font-size="11" font-weight="700" letter-spacing="1.5" fill="#5eead4">PLAN</text>
  <text x="258" y="217" font-family="'DejaVu Sans Mono', monospace" font-size="13" fill="#d3dae1">1  pick red_cube</text>
  <text x="258" y="239" font-family="'DejaVu Sans Mono', monospace" font-size="13" fill="#d3dae1">2  place red_cube &#8594; red_bin</text>
  <text x="258" y="261" font-family="'DejaVu Sans Mono', monospace" font-size="13" fill="#d3dae1">3  pick green_cube</text>
  <text x="258" y="283" font-family="'DejaVu Sans Mono', monospace" font-size="13" fill="#d3dae1">4  stack green_cube &#8594; red_cube</text>
  <path d="M410,294 L410,316" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="28" y="316" width="764" height="252" rx="16" fill="#10201d" stroke="#2dd4bf" stroke-dasharray="6 6" stroke-width="1.5" opacity="0.92"/>
  <rect x="44" y="306" width="200" height="22" rx="11" fill="#2dd4bf"/>
  <text x="144" y="321" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="10.5" font-weight="700" letter-spacing="1" fill="#06231f">THE CLOSED LOOP</text>

  <path d="M690,392 L690,362 Q690,356 684,356 L166,356 Q160,356 160,362 L160,390" fill="none" stroke="#40b866" stroke-width="2" marker-end="url(#ahok)"/>
  <text x="425" y="350" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="12" font-weight="700" fill="#40b866">&#10003; satisfied &#8594; next step</text>

  <rect x="72" y="392" width="180" height="76" rx="11" fill="#1a222b" stroke="#313b46" stroke-width="1.5"/>
  <text x="162" y="421" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="14" font-weight="700" fill="#e7edf3">EXECUTE</text>
  <text x="162" y="440" text-anchor="middle" font-size="12.5" fill="#9aa6b2">do the step in the</text>
  <text x="162" y="456" text-anchor="middle" font-size="12.5" fill="#9aa6b2">physics sim</text>

  <rect x="322" y="392" width="176" height="76" rx="11" fill="#1a222b" stroke="#313b46" stroke-width="1.5"/>
  <text x="410" y="421" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="14" font-weight="700" fill="#e7edf3">SEE</text>
  <text x="410" y="440" text-anchor="middle" font-size="12.5" fill="#9aa6b2">render a camera</text>
  <text x="410" y="456" text-anchor="middle" font-size="12.5" fill="#9aa6b2">image of the scene</text>

  <rect x="568" y="392" width="182" height="76" rx="11" fill="#1a222b" stroke="#313b46" stroke-width="1.5"/>
  <text x="659" y="421" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="14" font-weight="700" fill="#e7edf3">VERIFY &#183; VLM</text>
  <text x="659" y="440" text-anchor="middle" font-size="12.5" fill="#9aa6b2">read the image:</text>
  <text x="659" y="456" text-anchor="middle" font-size="12.5" fill="#9aa6b2">did the step work?</text>

  <path d="M252,430 L318,430" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M498,430 L564,430" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ah)"/>

  <path d="M659,468 L659,496 Q659,502 653,502 L470,502" fill="none" stroke="#e0a413" stroke-width="2" marker-end="url(#ahbad)"/>
  <text x="678" y="488" font-family="'DejaVu Sans Mono', monospace" font-size="12" font-weight="700" fill="#e0a413">&#10007; no</text>

  <rect x="256" y="484" width="214" height="62" rx="11" fill="#1a222b" stroke="#e0a413" stroke-width="1.6"/>
  <text x="363" y="510" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="14" font-weight="700" fill="#e0a413">RECOVERY &#183; LLM</text>
  <text x="363" y="529" text-anchor="middle" font-size="12.5" fill="#9aa6b2">retry, or re-plan the rest</text>

  <path d="M256,516 Q150,516 150,488 L150,470" fill="none" stroke="#e0a413" stroke-width="2" marker-end="url(#ahbad)"/>
  <text x="150" y="540" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="11" font-weight="700" fill="#e0a413">fix &amp; retry</text>

  <path d="M410,568 L410,592" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ah)"/>
  <text x="528" y="585" text-anchor="middle" font-size="11.5" fill="#9aa6b2">&#8230;once every step passes</text>

  <rect x="190" y="592" width="440" height="54" rx="11" fill="#1a222b" stroke="#313b46" stroke-width="1.5"/>
  <text x="410" y="615" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="13" font-weight="700" fill="#e7edf3">GROUND-TRUTH CHECK</text>
  <text x="410" y="634" text-anchor="middle" font-size="11.5" fill="#9aa6b2">exact geometry &#183; never shown to the agents &#183; scores real success</text>

  <text x="410" y="680" text-anchor="middle" font-family="'DejaVu Sans Mono', monospace" font-size="14" fill="#7f8c99">plan &#183; then for every step: execute &#8594; see &#8594; verify &#8594; (recover) &#183; repeat</text>
</svg>
